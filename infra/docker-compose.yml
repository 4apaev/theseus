name: theseus

services:
    kafka:
        image: apache/kafka:3.9.0
        container_name: theseus-kafka
        ports:
            - "9092:9092"

        environment:
            KAFKA_NODE_ID: "1"
            KAFKA_PROCESS_ROLES: "broker,controller"
            KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
            KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
            KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
            KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
            KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

        healthcheck:
            test:
                - "CMD-SHELL"
                - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"

            interval: 10s
            timeout: 5s
            retries: 12

        volumes:
            - kafka-data:/tmp/kraft-combined-logs

    postgres:
        image: postgres:17-alpine
        container_name: theseus-postgres
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: theseus
            POSTGRES_USER: theseus
            POSTGRES_PASSWORD: theseus

        healthcheck:
            test:
                - "CMD-SHELL"
                - "pg_isready -U theseus -d theseus"

            interval: 5s
            timeout: 5s
            retries: 12

        volumes:
            - postgres-data:/var/lib/postgresql/data

    kafka-ui:
        image: provectuslabs/kafka-ui:v0.7.2
        container_name: theseus-kafka-ui
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "8080:8080"

        environment:
            KAFKA_CLUSTERS_0_NAME: theseus
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
    kafka-data:
    postgres-data:
